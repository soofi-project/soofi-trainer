name: soofi-trainer

services:
  # ===========================================
  # Weaviate - Vector Database
  # ===========================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT}:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Vector MCP Server - Semantic Search
  # ===========================================
  vector-mcp:
    image: dfkisoofi/vector-mcp:${SOOFI_TRAINER_VERSION}
    build: ./vector-mcp
    container_name: vector-mcp
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_SCHEME=http
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - MCP_SERVER_PORT=8000
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # MinIO - S3-Compatible Object Storage
  # ===========================================
  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Knowledge Ingestion - One-Shot Loader
  # ===========================================
  knowledge-ingestion:
    build: ./knowledge-ingestion
    container_name: knowledge-ingestion
    restart: "no"
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./knowledge:/app/knowledge:ro
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===========================================
  # Advisor - LangGraph LLM Specialization Advisor
  # ===========================================
  advisor:
    image: dfkisoofi/advisor-agent:${SOOFI_TRAINER_VERSION}
    build: ./advisor
    container_name: advisor
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - VECTOR_MCP_URL=http://vector-mcp:8000/mcp
      - ADVISOR_NAME=soofi-advisor
    networks:
      - soofi-network
    depends_on:
      vector-mcp:
        condition: service_healthy
      knowledge-ingestion:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================
  # MCP Inspector - Debugging Tool
  # ===========================================
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "${MCPINSPECTOR_CLIENT_PORT}:6274"
      - "${MCPINSPECTOR_PROXY_PORT}:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_PROXY_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_AUTO_OPEN_ENABLED: "false"
    networks:
      - soofi-network

  # ===========================================
  # Open WebUI - Chat Interface
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT}:8080"
    environment:
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
      - OFFLINE_MODE=true
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
      - RAG_RERANKING_MODEL_AUTO_UPDATE=false
      - OPENAI_API_BASE_URL=http://advisor:8000/v1
      - OPENAI_API_KEY=dummy
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - soofi-network
    depends_on:
      advisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health | jq -ne 'input.status == true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ===========================================
  # STT - Speech-to-Text Service
  # ===========================================
  stt:
    image: dfkisoofi/soofi-stt:${SOOFI_TRAINER_VERSION}
    build: ./stt
    container_name: stt
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    ports:
      - "${STT_PORT}:8000"
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # TTS - Text-to-Speech Service
  # ===========================================
  tts:
    image: dfkisoofi/soofi-tts:${SOOFI_TRAINER_VERSION}
    build: ./tts
    container_name: tts
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    ports:
      - "${TTS_PORT}:8000"
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Soofi UI - A2UI Frontend
  # ===========================================
  soofi-ui:
    image: dfkisoofi/soofi-ui:${SOOFI_TRAINER_VERSION}
    build:
      context: ./soofi-ui
      args:
        # Build-time defaults (used by npm run dev and as fallback in the bundle).
        # At runtime, docker-entrypoint.sh generates env.js from the environment
        # variables below — no rebuild needed when changing these values.
        VITE_VOICE_CONTROLS_VISIBLE: ${VITE_VOICE_CONTROLS_VISIBLE}
        VITE_VOICE_ACTIVATION: ${VITE_VOICE_ACTIVATION}
        VITE_TTS_VOICE_DE: ${VITE_TTS_VOICE_DE}
        VITE_TTS_VOICE_EN: ${VITE_TTS_VOICE_EN}
    container_name: soofi-ui
    restart: unless-stopped
    environment:
      - VITE_VOICE_CONTROLS_VISIBLE=${VITE_VOICE_CONTROLS_VISIBLE}
      - VITE_VOICE_ACTIVATION=${VITE_VOICE_ACTIVATION}
      - VITE_TTS_VOICE_DE=${VITE_TTS_VOICE_DE}
      - VITE_TTS_VOICE_EN=${VITE_TTS_VOICE_EN}
    ports:
      - "${SOOFI_UI_PORT}:80"
    networks:
      - soofi-network
    depends_on:
      interaction-agent:
        condition: service_healthy
      stt:
        condition: service_healthy
      tts:
        condition: service_healthy

  # ===========================================
  # Training Agent - LangGraph + A2A
  # ===========================================
  training-agent:
    image: dfkisoofi/training-agent:${SOOFI_TRAINER_VERSION}
    build: ./training-agent
    container_name: training-agent
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - TRAINING_GATEWAY_MCP_URL=http://training-gateway:8000/mcp
    networks:
      - soofi-network
    depends_on:
      training-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Interaction Agent - LangGraph + A2A
  # ===========================================
  interaction-agent:
    image: dfkisoofi/soofi-ui-interaction-agent:${SOOFI_TRAINER_VERSION}
    build: ./interaction-agent
    container_name: interaction-agent
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - ADVISOR_A2A_URL=http://advisor:8000
      - TRAINING_AGENT_A2A_URL=http://training-agent:8000
      - AGENT_REGISTRY=interaction-agent=http://interaction-agent:8000,advisor=http://advisor:8000,training-agent=http://training-agent:8000,dataset-agent=http://dataset-agent:8000

    networks:
      - soofi-network
    depends_on:
      advisor:
        condition: service_healthy
      training-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # N8N
  # ===========================================
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres_n8n
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed DB with N8N user once since there aren't environment variables to do so
      - ./n8n/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soofi-network

  n8n:
    image: n8nio/n8n:${N8N_VERSION}
    container_name: n8n
    ports:
      - "${N8N_EXTERNAL_PORT}:5678"
    environment:
      # Database Configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres_n8n
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      # Instance Settings
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ONBOARDING_FLOW_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Timezone
      - TZ=${GENERIC_TIMEZONE}
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/import-workflows:ro
      - ./n8n/init_script.sh:/home/node/init_script.sh:ro
    networks:
      - soofi-network

  # ===========================================
  # Training Gateway - Training Job Management
  # ===========================================
  training-gateway:
    image: dfkisoofi/training-gateway:${SOOFI_TRAINER_VERSION}
    build: ./training-pipeline/training-gateway
    container_name: training-gateway
    restart: unless-stopped
    ports:
      - "${TRAINING_GATEWAY_PORT}:8000"
    env_file:
      - .env
    environment:
      # Internal values — not user-configurable
      - TRAINING_GATEWAY_URL=http://training-gateway:8000/webhooks
      - TRAINING_CONTAINER_NETWORK=soofi-trainer_soofi-network
    volumes:
      - training_gateway_data:/data
      # Mount Docker socket to allow starting training containers on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - soofi-network
      - soofi-training-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      training-container:
        condition: service_completed_successfully

  # ===========================================
  # Training Container (Build Target)
  # Not started as part of the default stack — used only to build the image.
  # up.sh automatically builds it on first run or when --build is passed.
  # ===========================================
  training-container:
    build: ./training-pipeline/training-container
    image: ${TRAINING_IMAGE_NAME}:${SOOFI_TRAINER_VERSION}
    container_name: training-container
    entrypoint: echo image ${TRAINING_IMAGE_NAME}:${SOOFI_TRAINER_VERSION} available

# ===========================================
# Networks
# ===========================================
networks:
  soofi-network:
    driver: bridge
    name: soofi-network
  soofi-training-network:
    driver: bridge
    name: soofi-training-network

# ===========================================
# Volumes
# ===========================================
volumes:
  weaviate_data:
  open_webui_data:
  postgres_data:
  n8n_data:
  minio_data:
  training_gateway_data:
