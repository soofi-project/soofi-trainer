name: soofi-trainer

services:
  # ===========================================
  # Weaviate - Vector Database
  # ===========================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT}:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Vector MCP Server - Semantic Search
  # ===========================================
  vector-mcp:
    build: ./vector-mcp
    container_name: vector-mcp
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_SCHEME=http
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - MCP_SERVER_PORT=8000
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy

  # ===========================================
  # MinIO - S3-Compatible Object Storage
  # ===========================================
  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Knowledge Ingestion - One-Shot Loader
  # ===========================================
  knowledge-ingestion:
    build: ./knowledge-ingestion
    container_name: knowledge-ingestion
    restart: "no"
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./knowledge:/app/knowledge:ro
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===========================================
  # MCP Inspector - Debugging Tool
  # ===========================================
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "${MCPINSPECTOR_CLIENT_PORT}:6274"
      - "${MCPINSPECTOR_PROXY_PORT}:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_PROXY_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_AUTO_OPEN_ENABLED: "false"
    networks:
      - soofi-network

  # ===========================================
  # Open WebUI - Chat Interface
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT}:8080"
    environment:
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
      - OFFLINE_MODE=true
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
      - RAG_RERANKING_MODEL_AUTO_UPDATE=false
    env_file:
      - ${ENV_SECRETS_FILE}
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health | jq -ne 'input.status == true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ===========================================
  # N8N
  # ===========================================
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed DB with N8N user once since there aren't environment variables to do so
      - ./n8n/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soofi-network

  n8n:
    image: n8nio/n8n:${N8N_VERSION}
    container_name: n8n
    ports:
      - "${N8N_EXTERNAL_PORT}:5678"
    environment:
      # Database Configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      # Instance Settings
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ONBOARDING_FLOW_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      # Timezone
      - TZ=${GENERIC_TIMEZONE}
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/import-workflows:ro
      - ./n8n/init_script.sh:/home/node/init_script.sh:ro
    networks:
      - soofi-network

  # ===========================================
  # Training Gateway - Training Job Management
  # ===========================================
  training-gateway:
    build: ./training-pipeline/training-gateway
    container_name: training-gateway
    restart: unless-stopped
    ports:
      - "${TRAINING_GATEWAY_PORT}:8000"
    env_file:
      - .env
    environment:
      # Internal values — not user-configurable
      - TRAINING_GATEWAY_URL=http://training-gateway:8000/webhooks
      - TRAINING_CONTAINER_NETWORK=soofi-trainer_soofi-network
    volumes:
      - training_gateway_data:/data
      # Mount Docker socket to allow starting training containers on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - soofi-network
      - soofi-training-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      training-container:
        condition: service_completed_successfully

  # ===========================================
  # Training Container (Build Target)
  # Not started as part of the default stack — used only to build the image.
  # up.sh automatically builds it on first run or when --build is passed.
  # ===========================================
  training-container:
    build: ./training-pipeline/training-container
    image: ${TRAINING_IMAGE_NAME}:${TRAINING_IMAGE_VERSION}
    container_name: training-container
    entrypoint: echo image ${TRAINING_IMAGE_NAME}:${TRAINING_IMAGE_VERSION} available

# ===========================================
# Networks
# ===========================================
networks:
  soofi-network:
    driver: bridge
    name: soofi-network
  soofi-training-network:
    driver: bridge
    name: soofi-training-network

# ===========================================
# Volumes
# ===========================================
volumes:
  weaviate_data:
  open_webui_data:
  postgres_data:
  n8n_data:
  minio_data:
  training_gateway_data:
