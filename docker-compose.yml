name: soofi-trainer

services:
  # ===========================================
  # Weaviate - Vector Database
  # ===========================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT}:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Vector MCP Server - Semantic Search
  # ===========================================
  vector-mcp:
    build: ./vector-mcp
    container_name: vector-mcp
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_SCHEME=http
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - MCP_SERVER_PORT=8000
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy

  # ===========================================
  # Knowledge Ingestion - One-Shot Loader
  # ===========================================
  knowledge-ingestion:
    build: ./knowledge-ingestion
    container_name: knowledge-ingestion
    restart: "no"
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
    volumes:
      - ./knowledge:/app/knowledge:ro
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy

  # ===========================================
  # MCP Inspector - Debugging Tool
  # ===========================================
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "${MCPINSPECTOR_CLIENT_PORT}:6274"
      - "${MCPINSPECTOR_PROXY_PORT}:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_PROXY_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_AUTO_OPEN_ENABLED: "false"
    networks:
      - soofi-network

  # ===========================================
  # Open WebUI - Chat Interface
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT}:8080"
    environment:
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
      - OFFLINE_MODE=true
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
      - RAG_RERANKING_MODEL_AUTO_UPDATE=false
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health | jq -ne 'input.status == true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ===========================================
  # N8N
  # ===========================================
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed DB with N8N user once since there aren't environment variables to do so
      - ./n8n/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soofi-network

  n8n:
    image: n8nio/n8n:${N8N_VERSION}
    container_name: n8n
    ports:
      - "${N8N_EXTERNAL_PORT}:5678"
    environment:
      # Database Configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      # Instance Settings
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ONBOARDING_FLOW_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      # Timezone
      - TZ=${GENERIC_TIMEZONE}
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n   
      - ./n8n/workflows:/home/node/import-workflows:ro
      - ./n8n/init_script.sh:/home/node/init_script.sh:ro 
    networks:
      - soofi-network

# ===========================================
# Networks
# ===========================================
networks:
  soofi-network:
    driver: bridge
    name: soofi-network

# ===========================================
# Volumes
# ===========================================
volumes:
  weaviate_data:
  open_webui_data:
  postgres_data:
  n8n_data: