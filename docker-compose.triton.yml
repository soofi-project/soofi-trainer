# ===========================================
# Soofi Trainer - Ollama Backend Override
# ===========================================
# Usage: ./up.sh --ollama
# Requires Ollama running locally with the models pulled:
#   ollama pull qwen2.5:7b
#   ollama pull bge-m3

services:
  advisor:
    environment:
      - ADVISOR_MODEL=qwen3.5-122b
      - OPENAI_BASE_URL=http://10.2.10.33:9000/v1

  interaction-agent:
    environment:
      - INTERACTION_MODEL=qwen3.5-122b
      - OPENAI_BASE_URL=http://10.2.10.33:9000/v1

  training-agent:
    environment:
      - INTERACTION_MODEL=qwen3.5-122b
      - OPENAI_BASE_URL=http://10.2.10.33:9000/v1