# ===========================================
# Soofi Trainer - Triton Backend Override
# ===========================================
# Usage: ./up.sh --triton
# Requires NVIDIA Triton Inference Server running with the model loaded.
# Embeddings: still provided by OpenAI (OPENAI_API_KEY required).

services:
  advisor:
    environment:
      ADVISOR_MODEL: qwen3.5-122b
      #ADVISOR_MODEL: qwen3.5-122b-gptq-int4
    #  ADVISOR_MODEL: qwen3.5-35b
      OPENAI_BASE_URL: http://10.2.10.33:9000/v1

  interaction-agent:
    environment:
      INTERACTION_MODEL: qwen3.5-122b
     # INTERACTION_MODEL: qwen3.5-122b-gptq-int4
      #INTERACTION_MODEL: qwen3.5-35b
      OPENAI_BASE_URL: http://10.2.10.33:9000/v1

  training-agent:
    environment:
      TRAINING_MODEL: qwen3.5-122b
      #TRAINING_MODEL: qwen3.5-122b-gptq-int4
      # TRAINING_MODEL: qwen3.5-35b
      OPENAI_BASE_URL: http://10.2.10.33:9000/v1

