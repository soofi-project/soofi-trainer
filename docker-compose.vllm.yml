      # TRAINING_AGENT_TEMPERATURE: 0.6
      # TRAINING_AGENT_TOP_P: 0.95
      # TRAINING_AGENT_MIN_P: 0.01
      # TRAINING_AGENT_ENABLE_THINKING: true
