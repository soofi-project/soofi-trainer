# ===========================================
# Soofi Trainer - vLLM Backend Override
# ===========================================
# Usage: ./up.sh --vllm
# Routes all services to H200 via LiteLLM (port 4000).
# STT: faster-whisper (Whisper large-v3) on GPU 1
# TTS: openedai-speech (Piper) on CPU

services:
  advisor:
    environment:
      SOOFI_LLM_BACKEND: vllm
      # Active: Nemotron-Cascade-2-30B-A3B-fp8 (thinking)
      ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      ADVISOR_TEMPERATURE: 0.6
      ADVISOR_TOP_P: 0.95
      ADVISOR_MIN_P: 0.01
      ADVISOR_ENABLE_THINKING: true
      # Alt: qwen35-122b-fp8 (non-thinking)
      # ADVISOR_MODEL: qwen35-122b-fp8
      # ADVISOR_TEMPERATURE: 1.0
      # ADVISOR_TOP_P: 0.95
      # ADVISOR_TOP_K: 20
      # ADVISOR_MIN_P: 0.0
      # ADVISOR_PRESENCE_PENALTY: 1.5
      # ADVISOR_REPEAT_PENALTY: 1.0
      # ADVISOR_ENABLE_THINKING: false
      # Alt: Nemotron-Cascade-2-30B-A3B-fp8 (thinking)
      # ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      # ADVISOR_TEMPERATURE: 0.6
      # ADVISOR_TOP_P: 0.95
      # ADVISOR_MIN_P: 0.01
      # ADVISOR_ENABLE_THINKING: true
      # Alt: NVIDIA-Nemotron-3-Super-120B-A12B-FP8 (thinking)
      # ADVISOR_MODEL: NVIDIA-Nemotron-3-Super-120B-A12B-FP8
      # ADVISOR_TEMPERATURE: 0.6
      # ADVISOR_TOP_P: 0.95
      # ADVISOR_MIN_P: 0.01
      # ADVISOR_ENABLE_THINKING: true
      # Alt: NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 (non-thinking)
      # ADVISOR_MODEL: NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      # ADVISOR_TEMPERATURE: 0.6
      # ADVISOR_TOP_P: 0.95
      # ADVISOR_MIN_P: 0.01
      # ADVISOR_ENABLE_THINKING: false
      # Alt: mixed-models / mixed-agents experimental
      # ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      # ADVISOR_TEMPERATURE: 0.6
      # ADVISOR_TOP_P: 0.95
      # ADVISOR_MIN_P: 0.01
      # ADVISOR_ENABLE_THINKING: true
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1

  interaction-agent:
