      SOOFI_LLM_BACKEND: vllm
      # Active: qwen35-122b-fp8 (non-thinking)
      INTERACTION_MODEL: qwen35-122b-fp8
      INTERACTION_TEMPERATURE: 1.0
      INTERACTION_TOP_P: 0.95
      INTERACTION_TOP_K: 20
      INTERACTION_MIN_P: 0.0
      INTERACTION_PRESENCE_PENALTY: 1.5
      INTERACTION_REPEAT_PENALTY: 1.0
      INTERACTION_ENABLE_THINKING: false
      # Alt: Nemotron-Cascade-2-30B-A3B-fp8 (thinking)
      # INTERACTION_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      # INTERACTION_TEMPERATURE: 0.6
