# ===========================================
# Soofi Trainer - vLLM Backend Override
# ===========================================
# Usage: ./up.sh --vllm
# Routes all services to H200 via LiteLLM (port 4000).
# STT: faster-whisper (Whisper large-v3) on GPU 1
# TTS: openedai-speech (Piper) on CPU

services:
  advisor:
    environment:
      ADVISOR_MODEL: qwen35-122b-fp8
      #ADVISOR_MODEL: qwen3.5-122b-gptq-int4
      #ADVISOR_MODEL: qwen35-35b-fp8
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1
      ADVISOR_TEMPERATURE: 1.0
      ADVISOR_TOP_P: 0.95
      ADVISOR_TOP_K: 20
      ADVISOR_MIN_P: 0.0
      ADVISOR_PRESENCE_PENALTY: 1.0
      ADVISOR_REPEAT_PENALTY: 1.0
      ADVISOR_ENABLE_THINKING: false

  interaction-agent:
    environment:
      INTERACTION_MODEL: qwen35-122b-fp8
      #INTERACTION_MODEL: qwen3.5-122b-gptq-int4
      #INTERACTION_MODEL: qwen35-35b-fp8
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1
      INTERACTION_TEMPERATURE: 1.0
      INTERACTION_TOP_P: 0.95
      INTERACTION_TOP_K: 20
      INTERACTION_MIN_P: 0.0
      INTERACTION_PRESENCE_PENALTY: 1.0
      INTERACTION_REPEAT_PENALTY: 1.0
      INTERACTION_ENABLE_THINKING: false

  training-agent:
    environment:
      TRAINING_AGENT_MODEL: qwen35-122b-fp8
      #TRAINING_AGENT_MODEL: qwen3.5-122b-gptq-int4
      #TRAINING_AGENT_MODEL: qwen35-35b-fp8
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1
      TRAINING_AGENT_TEMPERATURE: 1.0
      TRAINING_AGENT_TOP_P: 0.95
      TRAINING_AGENT_TOP_K: 20
      TRAINING_AGENT_MIN_P: 0.0
      TRAINING_AGENT_PRESENCE_PENALTY: 1.0
      TRAINING_AGENT_REPEAT_PENALTY: 1.0
      TRAINING_AGENT_ENABLE_THINKING: false

  knowledge-ingestion:
    environment:
      EMBEDDING_MODEL: openai:qwen3-embedding-8b
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1

  vector-mcp:
    environment:
      EMBEDDING_MODEL: openai:qwen3-embedding-8b
      OPENAI_BASE_URL: http://10.2.10.33:4000/v1
      RERANKER_ENABLED: "true"
      RERANKER_URL: http://10.2.10.33:8003
      RERANKER_CANDIDATE_LIMIT: "20"

  stt:
    environment:
      STT_BASE_URL: http://10.2.10.33:4000/v1

  tts:
    environment:
      TTS_BASE_URL: http://10.2.10.33:4000/v1
      TTS_MODEL: tts-1
