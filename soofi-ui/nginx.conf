server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to STT service
    location /api/stt/ {
        proxy_pass http://stt:8000/;
        proxy_read_timeout 30s;
    }

    # Reverse proxy to TTS service (streaming audio)
    location /api/tts/ {
        proxy_pass http://tts:8000/;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # Reverse proxy to interaction-agent
    location /api/ {
        proxy_pass http://interaction-agent:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }
}
