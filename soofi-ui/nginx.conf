server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS resolver with a short TTL so nginx re-resolves
    # container hostnames after restarts. Without this, nginx resolves once at
    # startup and may route to a stale IP if a container is restarted.
    # Variables in proxy_pass are required to activate the resolver per request.
    resolver 127.0.0.11 valid=5s;
    resolver_timeout 3s;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to MinIO knowledge documents
    location /docs/ {
        set $upstream_minio http://minio:9000;
        rewrite ^/docs(/.*)$ /knowledge$1 break;
        proxy_pass $upstream_minio;
        proxy_set_header Host minio:9000;
        proxy_hide_header Content-Disposition;
        types { text/markdown md; text/plain txt; application/pdf pdf; }
    }

    # Reverse proxy to STT service
    location /api/stt/ {
        set $upstream_stt http://stt:8000;
        rewrite ^/api/stt(/.*)$ $1 break;
        proxy_pass $upstream_stt;
        proxy_read_timeout 30s;
    }

    # Reverse proxy to TTS service (streaming audio)
    location /api/tts/ {
        set $upstream_tts http://tts:8000;
        rewrite ^/api/tts(/.*)$ $1 break;
        proxy_pass $upstream_tts;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # Reverse proxy to interaction-agent
    location /api/ {
        set $upstream_ia http://interaction-agent:8000;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass $upstream_ia;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }
}
