services:
    advisor:
      environment:
        ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B
        ADVISOR_TEMPERATURE: 1.0
        ADVISOR_TOP_P: 0.95
        ADVISOR_TOP_K: 40
        ADVISOR_MIN_P: 0.0
        ADVISOR_PRESENCE_PENALTY: 1.0
        ADVISOR_REPEAT_PENALTY: 1.0
        ADVISOR_ENABLE_THINKING: false

    interaction-agent:
      environment:
        INTERACTION_MODEL: Nemotron-Cascade-2-30B-A3B
        INTERACTION_TEMPERATURE: 1.0
        INTERACTION_TOP_P: 0.95
        INTERACTION_TOP_K: 40
        INTERACTION_MIN_P: 0.0
        INTERACTION_PRESENCE_PENALTY: 1.0
        INTERACTION_REPEAT_PENALTY: 1.0
        INTERACTION_ENABLE_THINKING: false

    training-agent:
      environment:
        TRAINING_AGENT_MODEL: Nemotron-Cascade-2-30B-A3B
        TRAINING_AGENT_TEMPERATURE: 1.0
        TRAINING_AGENT_TOP_P: 0.95
        TRAINING_AGENT_TOP_K: 40
        TRAINING_AGENT_MIN_P: 0.0
        TRAINING_AGENT_PRESENCE_PENALTY: 1.0
        TRAINING_AGENT_REPEAT_PENALTY: 1.0
        TRAINING_AGENT_ENABLE_THINKING: false
