services:
  # ===========================================
  # Caddy - HTTPS Reverse Proxy
  # Terminates TLS for landingpage and soofi-ui so mobile browsers
  # grant getUserMedia (mic access). Uses self-signed cert (tls internal)
  # — accept the browser warning once per device.
  # ===========================================
  # Profile: local (Default — self-signed certificate for testing purposes): ./up.sh --profile local
  caddy:
    profiles: ["local"]
    image: caddy:2.11.2-alpine
    container_name: soofi-caddy
    restart: unless-stopped
    environment:
      - LANDING_PAGE_HOSTNAME=${LANDING_PAGE_HOSTNAME}
      - LANDING_PAGE_HTTPS_PORT=${LANDING_PAGE_HTTPS_PORT}
      - SOOFI_UI_PORT=${SOOFI_UI_PORT}
      - GRAFANA_PORT=${GRAFANA_PORT}
      - PORTAINER_PORT=${PORTAINER_PORT}
      - N8N_EXTERNAL_PORT=${N8N_EXTERNAL_PORT}
      - OPENWEBUI_PORT=${OPENWEBUI_PORT}
      - FLOWISE_PORT=${FLOWISE_PORT}
      - MCPINSPECTOR_CLIENT_PORT=${MCPINSPECTOR_CLIENT_PORT}
      - MCPINSPECTOR_PROXY_PORT=${MCPINSPECTOR_PROXY_PORT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}
      - STT_PORT=${STT_PORT}
      - TTS_PORT=${TTS_PORT}
      - EDC_PROVIDER_PORT=${EDC_PROVIDER_PORT}
      - EDC_PORTAL_PROVIDER_PORT=${EDC_PORTAL_PROVIDER_PORT}
      - EDC_CONSUMER_PORT=${EDC_CONSUMER_PORT}
      - EDC_PORTAL_CONSUMER_PORT=${EDC_PORTAL_CONSUMER_PORT}
      - AAS_DISCOVERY_PORT=${AAS_DISCOVERY_PORT}
      - AAS_REGISTRY_PORT=${AAS_REGISTRY_PORT}
      - SM_REGISTRY_PORT=${SM_REGISTRY_PORT}
      - AAS_ENVIRONMENT_PORT=${AAS_ENVIRONMENT_PORT}
      - AAS_WEBUI_PORT=${AAS_WEBUI_PORT}
      - MNESTIX_BROWSER_PORT=${MNESTIX_BROWSER_PORT}
      - MNESTIX_PROXY_PORT=${MNESTIX_PROXY_PORT}
    ports:
      - "${LANDING_PAGE_HTTPS_PORT}:${LANDING_PAGE_HTTPS_PORT}"
      - "${SOOFI_UI_PORT}:${SOOFI_UI_PORT}"
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
      - "${PORTAINER_PORT}:${PORTAINER_PORT}"
      - "${N8N_EXTERNAL_PORT}:${N8N_EXTERNAL_PORT}"
      - "${OPENWEBUI_PORT}:${OPENWEBUI_PORT}"
      - "${FLOWISE_PORT}:${FLOWISE_PORT}"
      - "${MCPINSPECTOR_CLIENT_PORT}:${MCPINSPECTOR_CLIENT_PORT}"
      - "${MCPINSPECTOR_PROXY_PORT}:${MCPINSPECTOR_PROXY_PORT}"
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
      - "${STT_PORT}:${STT_PORT}"
      - "${TTS_PORT}:${TTS_PORT}"
      - "${EDC_PROVIDER_PORT}:${EDC_PROVIDER_PORT}"
      - "${EDC_PORTAL_PROVIDER_PORT}:${EDC_PORTAL_PROVIDER_PORT}"
      - "${EDC_CONSUMER_PORT}:${EDC_CONSUMER_PORT}"
      - "${EDC_PORTAL_CONSUMER_PORT}:${EDC_PORTAL_CONSUMER_PORT}"
      - "${AAS_DISCOVERY_PORT}:${AAS_DISCOVERY_PORT}"
      - "${AAS_REGISTRY_PORT}:${AAS_REGISTRY_PORT}"
      - "${SM_REGISTRY_PORT}:${SM_REGISTRY_PORT}"
      - "${AAS_ENVIRONMENT_PORT}:${AAS_ENVIRONMENT_PORT}"
      - "${AAS_WEBUI_PORT}:${AAS_WEBUI_PORT}"
      - "${MNESTIX_BROWSER_PORT}:${MNESTIX_BROWSER_PORT}"
      - "${MNESTIX_PROXY_PORT}:${MNESTIX_PROXY_PORT}"
    volumes:
      - ./compose/admin/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./compose/admin/caddy/caddy-root.crt:/data/caddy/pki/authorities/local/root.crt:ro
      - ./compose/admin/caddy/caddy-root.key:/data/caddy/pki/authorities/local/root.key:ro
    networks:
      - soofi-network
      - soofi-aas-network
      - soofi-admin-network
      - soofi-edc-network
    depends_on:
      - landingpage

  # ===========================================
  # Caddy (Cloudflare) - Let's Encrypt via DNS-Challenge
  # Uses a registered domain with public trusted certificate.
  # Requires: LANDING_PAGE_HOSTNAME + CLOUDFLARE_API_TOKEN in ~/.env.secrets
  # ===========================================
  # Profile: domain  →  ./up.sh --profile domain
  caddy-cloudflare:
    profiles: ["domain"]
    image: caddybuilds/caddy-cloudflare:2.11.2
    container_name: soofi-caddy-cloudflare
    restart: unless-stopped
    env_file:
      - ${ENV_SECRETS_FILE}
    environment:
      - LANDING_PAGE_HOSTNAME=${LANDING_PAGE_HOSTNAME}
      - LANDING_PAGE_HTTPS_PORT=${LANDING_PAGE_HTTPS_PORT}
      - SOOFI_UI_PORT=${SOOFI_UI_PORT}
      - GRAFANA_PORT=${GRAFANA_PORT}
      - PORTAINER_PORT=${PORTAINER_PORT}
      - N8N_EXTERNAL_PORT=${N8N_EXTERNAL_PORT}
      - OPENWEBUI_PORT=${OPENWEBUI_PORT}
      - FLOWISE_PORT=${FLOWISE_PORT}
      - MCPINSPECTOR_CLIENT_PORT=${MCPINSPECTOR_CLIENT_PORT}
      - MCPINSPECTOR_PROXY_PORT=${MCPINSPECTOR_PROXY_PORT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}
      - STT_PORT=${STT_PORT}
      - TTS_PORT=${TTS_PORT}
      - EDC_PROVIDER_PORT=${EDC_PROVIDER_PORT}
      - EDC_PORTAL_PROVIDER_PORT=${EDC_PORTAL_PROVIDER_PORT}
      - EDC_CONSUMER_PORT=${EDC_CONSUMER_PORT}
      - EDC_PORTAL_CONSUMER_PORT=${EDC_PORTAL_CONSUMER_PORT}
      - AAS_DISCOVERY_PORT=${AAS_DISCOVERY_PORT}
      - AAS_REGISTRY_PORT=${AAS_REGISTRY_PORT}
      - SM_REGISTRY_PORT=${SM_REGISTRY_PORT}
      - AAS_ENVIRONMENT_PORT=${AAS_ENVIRONMENT_PORT}
      - AAS_WEBUI_PORT=${AAS_WEBUI_PORT}
      - MNESTIX_BROWSER_PORT=${MNESTIX_BROWSER_PORT}
      - MNESTIX_PROXY_PORT=${MNESTIX_PROXY_PORT}
    ports:
      - "${LANDING_PAGE_HTTPS_PORT}:${LANDING_PAGE_HTTPS_PORT}"
      - "${SOOFI_UI_PORT}:${SOOFI_UI_PORT}"
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
      - "${PORTAINER_PORT}:${PORTAINER_PORT}"
      - "${N8N_EXTERNAL_PORT}:${N8N_EXTERNAL_PORT}"
      - "${OPENWEBUI_PORT}:${OPENWEBUI_PORT}"
      - "${FLOWISE_PORT}:${FLOWISE_PORT}"
      - "${MCPINSPECTOR_CLIENT_PORT}:${MCPINSPECTOR_CLIENT_PORT}"
      - "${MCPINSPECTOR_PROXY_PORT}:${MCPINSPECTOR_PROXY_PORT}"
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
      - "${STT_PORT}:${STT_PORT}"
      - "${TTS_PORT}:${TTS_PORT}"
      - "${EDC_PROVIDER_PORT}:${EDC_PROVIDER_PORT}"
      - "${EDC_PORTAL_PROVIDER_PORT}:${EDC_PORTAL_PROVIDER_PORT}"
      - "${EDC_CONSUMER_PORT}:${EDC_CONSUMER_PORT}"
      - "${EDC_PORTAL_CONSUMER_PORT}:${EDC_PORTAL_CONSUMER_PORT}"
      - "${AAS_DISCOVERY_PORT}:${AAS_DISCOVERY_PORT}"
      - "${AAS_REGISTRY_PORT}:${AAS_REGISTRY_PORT}"
      - "${SM_REGISTRY_PORT}:${SM_REGISTRY_PORT}"
      - "${AAS_ENVIRONMENT_PORT}:${AAS_ENVIRONMENT_PORT}"
      - "${AAS_WEBUI_PORT}:${AAS_WEBUI_PORT}"
      - "${MNESTIX_BROWSER_PORT}:${MNESTIX_BROWSER_PORT}"
      - "${MNESTIX_PROXY_PORT}:${MNESTIX_PROXY_PORT}"
    volumes:
      - ./compose/admin/caddy/Caddyfile.cloudflare:/etc/caddy/Caddyfile:ro
      - ~/caddy_data:/data
      - caddy_cloudflare_config:/config 
    networks:
      - soofi-network
      - soofi-aas-network
      - soofi-admin-network
      - soofi-edc-network
    depends_on:
      - landingpage

  # ===========================================
  # Portainer - Docker Management UI
  # ===========================================
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION}
    container_name: portainer
    restart: always
    command: --admin-password-file=/secrets/admin-password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose/admin/portainer/admin-password:/secrets/admin-password
    networks:
      - soofi-admin-network

  landingpage:
    image: dfkisoofi/landingpage:${LANDING_PAGE_VERSION}
    container_name: landingpage
    restart: always
    build: ./landingpage
    ports:
      - "${LANDING_PAGE_PORT}:80"
    env_file:
      - .env
    volumes:
      - ./compose/admin/landingpage/content/index.html:/usr/share/nginx/html/index.html
      - ./compose/admin/landingpage/content/favicon.ico:/usr/share/nginx/html/favicon.ico
      - ./compose/admin/landingpage/content/manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./compose/admin/landingpage/content/icons/Soofi-Dark-192.png:/usr/share/nginx/html/icons/icon-192.png:ro
      - ./compose/admin/landingpage/content/icons/Soofi-Dark-512.png:/usr/share/nginx/html/icons/icon-512.png:ro
      - ./compose/admin/landingpage/content/media:/usr/share/nginx/html/media
      - ./compose/admin/landingpage/content/slides:/slides-templates:ro
    networks:
      - soofi-network

volumes:
  caddy_data:
  caddy_config:
  caddy_cloudflare_config: