services:      
  # ===========================================
  # Portainer - Docker Management UI
  # ===========================================
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION}
    container_name: portainer
    restart: always
    ports:
      - "${PORTAINER_PORT}:9000"
    command: --admin-password-file=/secrets/admin-password
    environment:
      - VIRTUAL_HOST=portainer.${EXTERNAL_HOSTNAME}
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose/config/portainer/admin-password:/secrets/admin-password
    networks:
      - soofi-admin-network
      - soofi-proxy-network

  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.10.0-alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro      
      - ./compose/config/nginx-proxy/proxy.conf:/etc/nginx/proxy.conf
    environment:
      - DEFAULT_HOST=${EXTERNAL_HOSTNAME}
    networks:
      - soofi-proxy-network