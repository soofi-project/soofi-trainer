services:
  # ===========================================
  # MCP Inspector - Debugging Tool
  # ===========================================
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - MCP_PROXY_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_AUTO_OPEN_ENABLED=false
      - ALLOWED_ORIGINS=https://localhost:${MCPINSPECTOR_CLIENT_PORT},https://${LANDING_PAGE_HOSTNAME}:${MCPINSPECTOR_CLIENT_PORT}
    networks:
      - soofi-network


