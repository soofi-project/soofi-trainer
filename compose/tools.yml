services:
  # ===========================================
  # PostgreSQL - N8N Database
  # ===========================================
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres_n8n
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed DB with N8N user once since there aren't environment variables to do so
      - ./n8n/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soofi-network

  # ===========================================
  # N8N - Workflow Automation
  # ===========================================
  n8n:
    image: n8nio/n8n:${N8N_VERSION}
    container_name: n8n
    ports:
      - "${N8N_EXTERNAL_PORT}:5678"
    environment:
      # Database Configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres_n8n
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      # Instance Settings
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ONBOARDING_FLOW_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Timezone
      - TZ=${GENERIC_TIMEZONE}
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/import-workflows:ro
      - ./n8n/init_script.sh:/home/node/init_script.sh:ro
    networks:
      - soofi-network

  # ===========================================
  # Open WebUI - Chat Interface
  # ===========================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT}:8080"
    environment:
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
      - OFFLINE_MODE=true
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
      - RAG_RERANKING_MODEL_AUTO_UPDATE=false
      - OPENAI_API_BASE_URL=http://advisor:8000/v1
      - OPENAI_API_KEY=dummy
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - soofi-network
    depends_on:
      advisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health | jq -ne 'input.status == true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ===========================================
  # MCP Inspector - Debugging Tool
  # ===========================================
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "${MCPINSPECTOR_CLIENT_PORT}:6274"
      - "${MCPINSPECTOR_PROXY_PORT}:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_PROXY_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_AUTO_OPEN_ENABLED: "false"
    networks:
      - soofi-network

volumes:
  postgres_data:
  n8n_data:
  open_webui_data:
