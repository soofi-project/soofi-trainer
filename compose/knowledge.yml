services:
  # ===========================================
  # Weaviate - Vector Database
  # ===========================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    restart: unless-stopped
    #ports:
    #  - "${WEAVIATE_PORT}:8080"
    #  - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
      - CLUSTER_JOIN=weaviate
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Vector MCP Server - Semantic Search
  # ===========================================
  vector-mcp:
    image: dfkisoofi/vector-mcp:${SOOFI_TRAINER_VERSION}
    build: ./vector-mcp
    container_name: vector-mcp
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_SCHEME=http
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - MCP_SERVER_PORT=8000
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # MinIO - S3-Compatible Object Storage
  # ===========================================
  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY} 
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Knowledge Ingestion - One-Shot Loader
  # ===========================================
  knowledge-ingestion:
    image: dfkisoofi/knowledge-ingestion:${SOOFI_TRAINER_VERSION}
    build: ./knowledge-ingestion
    container_name: knowledge-ingestion
    restart: "no"
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./knowledge:/app/knowledge:ro
    networks:
      - soofi-network
    depends_on:
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===========================================
  # Advisor - LangGraph LLM Specialization Advisor
  # ===========================================
  advisor:
    image: dfkisoofi/advisor-agent:${SOOFI_TRAINER_VERSION}
    build: ./advisor
    container_name: advisor
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - VECTOR_MCP_URL=http://vector-mcp:8000/mcp
      - ADVISOR_NAME=soofi-advisor
    networks:
      - soofi-network
    depends_on:
      vector-mcp:
        condition: service_healthy
      knowledge-ingestion:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================
  # Hugging Face Official MCP Server
  # ===========================================
  huggingface-mcp:
    image: ghcr.io/evalstate/hf-mcp-server:${OFFICIAL_HF_MCP_VERSION:-latest}
    container_name: huggingface-mcp
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - TRANSPORT=streamableHttpJson
      - PORT=8000
      - DEFAULT_HF_TOKEN=${HF_TOKEN:-}
    networks:
      - soofi-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000/mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Dataset Agent - Public Dataset Discovery (A2A)
  # ===========================================
  dataset-agent:
    image: dfkisoofi/dataset-agent:${DATASETAGENT_VERSION}
    build: ./dataset-agent
    container_name: dataset-agent
    restart: unless-stopped
    env_file:
      - .env
      - ${ENV_SECRETS_FILE}
    environment:
      - EDC_MCP_URL=http://edc-consumer-mcp:8081/mcp
      - HUGGINGFACE_MCP_URL=http://huggingface-mcp:8000/mcp
    networks:
      - soofi-network
    depends_on:
      huggingface-mcp:
        condition: service_healthy
      edc-consumer-mcp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weaviate_data:
  minio_data:
