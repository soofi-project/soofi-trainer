<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<!-- meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"-->
    	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    	<meta name="apple-mobile-web-app-capable" content="yes" />
    	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    	<meta name="mobile-web-app-capable" content="yes" />
    	<meta name="apple-mobile-web-app-title" content="Soofi" />
    	<link rel="manifest" href="/manifest.json" />
    	<link rel="apple-touch-icon" href="/icons/icon-192.png" />

		<title>Soofi</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/white.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section data-markdown="slides/slides.md"
					data-separator="^---"
					data-separator-vertical="^--"
					data-separator-notes="^Note:">
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			// Reveal.js sets allow="autoplay", appends the iframe, then immediately sets
			// src — all in one synchronous block. MutationObserver fires too late.
			// We intercept setAttribute at the prototype level so microphone is added to
			// the allow attribute in the same call stack, before navigation starts.
			(function () {
				const _setAttribute = HTMLIFrameElement.prototype.setAttribute;
				HTMLIFrameElement.prototype.setAttribute = function (attr, value) {
					if (attr === 'src' && this.closest && this.closest('.slide-background')) {
						const current = this.getAttribute('allow') || '';
						if (!current.includes('microphone')) {
							_setAttribute.call(this, 'allow', current ? `${current}; microphone` : 'microphone');
						}
					}
					_setAttribute.call(this, attr, value);
				};
			})();

			Reveal.initialize({
				hash: true,
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
			});

			Reveal.on('ready', () => {
				document.querySelectorAll('.reveal a[href^="http"]').forEach(a => {
					a.target = '_blank';
					a.rel = 'noopener';
				});
			});
		</script>
	</body>
</html>
