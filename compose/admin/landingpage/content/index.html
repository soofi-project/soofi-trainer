<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<!-- meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"-->
    	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    	<meta name="apple-mobile-web-app-capable" content="yes" />
    	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    	<meta name="mobile-web-app-capable" content="yes" />
    	<meta name="apple-mobile-web-app-title" content="Soofi" />
    	<link rel="manifest" href="/manifest.json" />
    	<link rel="apple-touch-icon" href="/icons/icon-192.png" />

		<title>Soofi</title>

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/white.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">

		<!-- Soofi CI overrides -->
		<style>
			:root {
				--r-background-color: #F5F6F8;
				--r-main-font: 'Poppins', 'Segoe UI', sans-serif;
				--r-heading-font: 'Poppins', 'Segoe UI', sans-serif;
				--r-main-color: #000029;
				--r-heading-color: #000029;
				--r-link-color: #5B1EFB;
				--r-link-color-hover: #7711DD;
				--r-selection-background-color: #EDE9FE;
			}
			.reveal .slides section {
				text-align: left;
			}
			.reveal h1, .reveal h2 {
				background: linear-gradient(90deg, #5B1EFB, #AA22CC);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}
			.reveal ul li::marker {
				color: #16ABFC;
			}
			.reveal strong {
				color: #5B1EFB;
			}
		</style>
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section data-markdown="slides/slides.md"
					data-separator="^---"
					data-separator-vertical="^--"
					data-separator-notes="^Note:">
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			// Reveal.js sets allow="autoplay", appends the iframe, then immediately sets
			// src — all in one synchronous block. MutationObserver fires too late.
			// We intercept setAttribute at the prototype level so microphone is added to
			// the allow attribute in the same call stack, before navigation starts.
			(function () {
				const _setAttribute = HTMLIFrameElement.prototype.setAttribute;
				HTMLIFrameElement.prototype.setAttribute = function (attr, value) {
					if (attr === 'src' && this.closest && this.closest('.slide-background')) {
						const current = this.getAttribute('allow') || '';
						if (!current.includes('microphone')) {
							_setAttribute.call(this, 'allow', current ? `${current}; microphone` : 'microphone');
						}
					}
					_setAttribute.call(this, attr, value);
				};
			})();

			Reveal.initialize({
				hash: true,
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
			});

			Reveal.on('ready', () => {
				document.querySelectorAll('.reveal a[href^="http"]').forEach(a => {
					a.target = '_blank';
					a.rel = 'noopener';
				});
			});
		</script>
	</body>
</html>
