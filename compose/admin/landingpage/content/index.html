<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>Soofi</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/white.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section data-markdown="slides/slides.md"
					data-separator="^---"
					data-separator-vertical="^--"
					data-separator-notes="^Note:">
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			Reveal.initialize({
				hash: true,
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
			});

			const applyBackgroundIframePermissions = () => {
				document.querySelectorAll('.slide-background iframe').forEach(iframe => {
					const current = iframe.getAttribute('allow') || '';
					if (!current.includes('microphone')) {
						iframe.setAttribute('allow', current ? `${current}; microphone` : 'microphone');
					}
				});
			};

			Reveal.on('ready', () => {
				applyBackgroundIframePermissions();
				document.querySelectorAll('.reveal a[href^="http"]').forEach(a => {
					a.target = '_blank';
					a.rel = 'noopener';
				});
			});
			
			Reveal.on('slidechanged', applyBackgroundIframePermissions);
		</script>
	</body>
</html>
