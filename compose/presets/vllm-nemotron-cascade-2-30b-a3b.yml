services:
  advisor:
    environment:
      ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      ADVISOR_TEMPERATURE: 0.6
      ADVISOR_TOP_P: 0.95
      ADVISOR_MIN_P: 0.01
      ADVISOR_ENABLE_THINKING: true

  interaction-agent:
    environment:
      INTERACTION_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      INTERACTION_TEMPERATURE: 0.6
      INTERACTION_TOP_P: 0.95
      INTERACTION_MIN_P: 0.01
      INTERACTION_ENABLE_THINKING: true

  training-agent:
    environment:
      TRAINING_AGENT_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      TRAINING_AGENT_TEMPERATURE: 0.6
      TRAINING_AGENT_TOP_P: 0.95
      TRAINING_AGENT_MIN_P: 0.01
      TRAINING_AGENT_ENABLE_THINKING: true