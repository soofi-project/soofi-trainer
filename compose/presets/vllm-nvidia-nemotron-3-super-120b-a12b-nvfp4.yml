services:
  advisor:
    environment:
      ADVISOR_MODEL: NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      ADVISOR_TEMPERATURE: 0.6
      ADVISOR_TOP_P: 0.95
      ADVISOR_MIN_P: 0.01
      ADVISOR_ENABLE_THINKING: false

  interaction-agent:
    environment:
      INTERACTION_MODEL: NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      INTERACTION_TEMPERATURE: 0.6
      INTERACTION_TOP_P: 0.95
      INTERACTION_MIN_P: 0.01
      INTERACTION_ENABLE_THINKING: false
  training-agent:
    environment:
      TRAINING_AGENT_MODEL: NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      TRAINING_AGENT_TEMPERATURE: 0.6
      TRAINING_AGENT_TOP_P: 0.95
      TRAINING_AGENT_MIN_P: 0.01
      TRAINING_AGENT_ENABLE_THINKING: false