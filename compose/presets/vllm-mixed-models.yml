# When enabling thinking, change temperature to 0.6 and presence penalty to 0.0
# Running a big model for the most demaning task of the system, plus smaller tasks 
# that demand less reasoning abilities, or higher throughput, or smaller latencies
# is feasible as shown with this experimental preset.
services:
  advisor:
    environment:
      ADVISOR_MODEL: Nemotron-Cascade-2-30B-A3B-fp8
      ADVISOR_TEMPERATURE: 0.6
      ADVISOR_TOP_P: 0.95
      ADVISOR_MIN_P: 0.01
      ADVISOR_ENABLE_THINKING: true

  interaction-agent:
    environment:
      INTERACTION_MODEL: qwen35-122b-fp8
      INTERACTION_TEMPERATURE: 1.0
      INTERACTION_TOP_P: 0.95
      INTERACTION_TOP_K: 20
      INTERACTION_MIN_P: 0.0
      INTERACTION_PRESENCE_PENALTY: 1.5
      INTERACTION_REPEAT_PENALTY: 1.0
      INTERACTION_ENABLE_THINKING: false

  training-agent:
    environment:
      TRAINING_AGENT_MODEL: Qwen3.5-27B-FP8 
      TRAINING_AGENT_TEMPERATURE: 0.6
      TRAINING_AGENT_TOP_P: 0.95
      TRAINING_AGENT_MIN_P: 0.01
      TRAINING_AGENT_ENABLE_THINKING: true
